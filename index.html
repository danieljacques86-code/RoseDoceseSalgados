<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROSE DOCES E SALGADOS</title>
  <style>
    body { 
      font-family: Arial; 
      background: linear-gradient(rgba(255,248,245,.9), rgba(255,248,245,.9)), 
                  url('https://images.unsplash.com/photo-1551028719-00167b16eac5?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80') center/cover fixed; 
      margin:0; 
    }
    header { 
      background: linear-gradient(135deg, #ff8f8f, #ff6f61); 
      color:#fff; 
      text-align:center; 
      padding:40px 20px; 
      box-shadow: 0 4px 20px rgba(255,143,143,.3);
    }
    #categorias { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin:20px; }
    button { 
      padding:12px 20px; 
      border:none; 
      border-radius:25px; 
      background:#ff6f61; 
      color:#fff; 
      cursor:pointer; 
      font-weight:bold;
      transition: all .3s;
    }
    button:hover, button.active { 
      background:#e85a4f; 
      transform: scale(1.05);
    }
    #produtos { 
      display:grid; 
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); 
      gap:25px; 
      padding:30px; 
      max-width:1400px; 
      margin:auto; 
    }
    .card { 
      background: rgba(255,255,255,.95); 
      border-radius:20px; 
      overflow:hidden; 
      box-shadow:0 10px 30px rgba(0,0,0,.15); 
      transition: transform .3s;
    }
    .card:hover { transform: translateY(-10px); }
    .card img { 
      width:100%; 
      height:250px; 
      object-fit:cover; 
    }
    .info { 
      padding:20px; 
      text-align:center;
    }
    .preco { 
      color:#e85a4f; 
      font-size:24px; 
      font-weight:bold; 
      margin:15px 0; 
    }
    .whatsapp-btn { 
      display:inline-block; 
      padding:12px 25px; 
      background:#25D366; 
      color:#fff; 
      text-decoration:none; 
      border-radius:25px; 
      font-weight:bold;
      transition: background .3s;
    }
    .whatsapp-btn:hover { background:#128C7E; }
  </style>
</head>
<body>
  <header>
    <h1>🍰 Delícias da Rose 🍟</h1>
    <p>Doces e Salgados Caseiros • Feitos com Amor em São José do Rio Preto</p>
  </header>

  <div id="categorias"></div>
  <div id="produtos"></div>

  <script>
    const dados = {
      whatsapp: '5517999999999',  // ← TROQUE PELO SEU NÚMERO
      categorias: {
        '🍰 Doces': [
          { nome: 'Brigadeiro Gourmet', preco: 'R$ 15,00', descricao: 'Brigadeiro cremoso com granulado belga', foto: 'https://images.unsplash.com/photo-1551028719-00167b16eac5?w=400&h=250&fit=crop' },
          { nome: 'Bolo de Cenoura', preco: 'R$ 35,00', descricao: 'Bolo fofinho c/ cobertura de chocolate', foto: 'https://images.unsplash.com/photo-1562440499-64e7f7a33733?w=400&h=250&fit=crop' },
          { nome: 'Pudim de Leite', preco: 'R$ 20,00', descricao: 'Pudim cremoso com caramelo caseiro', foto: 'https://images.unsplash.com/photo-1603482824006-f8b5f4e0ceae?w=400&h=250&fit=crop' },
          { nome: 'Torta Holandesa', preco: 'R$ 45,00', descricao: 'Torta crocante de chocolate e caramelo', foto: 'https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=400&h=250&fit=crop' }
        ],
        '🍟 Salgados': [
          { nome: 'Coxinha de Frango', preco: 'R$ 12,00 / 5un', descricao: 'Coxinha crocante recheada c/ frango', foto: 'https://images.unsplash.com/photo-1621996346565-e3adc808ee9d?w=400&h=250&fit=crop' },
          { nome: 'Pastel de Carne', preco: 'R$ 10,00 / 5un', descricao: 'Pastel frito c/ carne moída temperada', foto: 'https://images.unsplash.com/photo-1589924565761-6198d22b3f0f?w=400&h=250&fit=crop' },
          { nome: 'Empada de Palmito', preco: 'R$ 8,00 / un', descricao: 'Empada leve e saborosa', foto: 'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=400&h=250&fit=crop' },
          { nome: 'Risole de Queijo', preco: 'R$ 11,00 / 5un', descricao: 'Risole recheado c/ muçarela derretida', foto: 'https://images.unsplash.com/photo-1579586337278-3f436f89a1b4?w=400&h=250&fit=crop' }
        ],
        '❤️ Combo Família': [
          { nome: 'Combo Salgado 20un', preco: 'R$ 85,00', descricao: 'Mix coxinhas + pastéis + empadas', foto: 'https://images.unsplash.com/photo-1562440499-64e7f7a33733?w=400&h=250&fit=crop' },
          { nome: 'Combo Doce 12un', preco: 'R$ 65,00', descricao: 'Brigadeiros + brownies + cookies', foto: 'https://images.unsplash.com/photo-1551028719-00167b16eac5?w=400&h=250&fit=crop' },
          { nome: 'Festa Kids 30un', preco: 'R$ 140,00', descricao: 'Salgados + docinhos infantis', foto: 'https://images.unsplash.com/photo-1603482824006-f8b5f4e0ceae?w=400&h=250&fit=crop' }
        ]
      }
    };

    let categoriaAtual = Object.keys(dados.categorias)[0];

    function renderizarTudo() {
      const catArea = document.getElementById('categorias');
      catArea.innerHTML = '';

      Object.keys(dados.categorias).forEach(cat => {
        const btn = document.createElement('button');
        btn.textContent = cat;
        btn.className = categoriaAtual === cat ? 'active' : '';
        btn.onclick = () => {
          categoriaAtual = cat;
          document.querySelectorAll('#categorias button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderizarProdutos();
        };
        catArea.appendChild(btn);
      });

      renderizarProdutos();
    }

    function renderizarProdutos() {
      const area = document.getElementById('produtos');
      area.innerHTML = '';

      const produtos = dados.categorias[categoriaAtual];
      
      produtos.forEach(prod => {
        const msg = encodeURIComponent(`Olá Rose! Quero pedir: ${prod.nome} - ${prod.preco}`);
        const card = `
          <div class="card">
            <img src="${prod.foto}" alt="${prod.nome}" onerror="this.src='https://via.placeholder.com/400x250/ff69b4/fff?text=${encodeURIComponent(prod.nome)}'">
            <div class="info">
              <h3>${prod.nome}</h3>
              <p>${prod.descricao}</p>
              <div class="preco">${prod.preco}</div>
              <a href="https://wa.me/${dados.whatsapp}?text=${msg}" target="_blank" class="whatsapp-btn">🍏 Pedir no WhatsApp</a>
            </div>
          </div>
        `;
        area.innerHTML += card;
      });
    }

    // Carrega imediatamente
    renderizarTudo();
  </script>
</body>
</html>
