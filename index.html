<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delícias da Rose</title>
  <style>
    body { font-family: Arial; background:#fff8f5; margin:0; }
    header { background:#ff8f8f; color:#fff; text-align:center; padding:40px 20px; }
    #categorias { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin:20px; }
    button { padding:10px 16px; border:none; border-radius:20px; background:#ff6f61; color:#fff; cursor:pointer; }
    #produtos { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; padding:20px; max-width:1200px; margin:auto; }
    .card { background:#fff; border-radius:14px; overflow:hidden; box-shadow:0 6px 16px rgba(0,0,0,.08); }
    .card img { width:100%; height:220px; object-fit:cover; }
    .info { padding:15px; }
    .preco { color:#e85a4f; font-size:20px; font-weight:bold; margin:8px 0; }
  </style>
</head>
<body>
  <header>
    <h1 id="titulo">Carregando...</h1>
    <p id="subtitulo"></p>
  </header>

  <div id="categorias"></div>
  <div id="produtos"></div>

  <script>
    const DATA_URL = 'https://dl dropbox.com/scl/fi/a5luwu23j65jwt1tyany9/rosedocesesalgados.txt?rlkey=rnefg3uw47jd1gz8wb0eglpta&st=t71vs5p8&dl=1';

    let dados = {
      titulo: '',
      subtitulo: '',
      whatsapp: '',
      categorias: {}
    };

    let categoriaAtual = '';

    async function carregarTXT() {
      const resp = await fetch(DATA_URL, { cache: 'no-store' });
      const txt = await resp.text();
      interpretarTXT(txt);
      renderizarTudo();
    }

    function interpretarTXT(txt) {
      const linhas = txt.split('\n').map(l => l.trim()).filter(Boolean);
      let categoria = '';

      for (const linha of linhas) {
        if (linha.startsWith('TITULO=')) {
          dados.titulo = linha.replace('TITULO=', '').trim();
        } else if (linha.startsWith('SUBTITULO=')) {
          dados.subtitulo = linha.replace('SUBTITULO=', '').trim();
        } else if (linha.startsWith('WHATSAPP=')) {
          dados.whatsapp = linha.replace('WHATSAPP=', '').trim();
        } else if (linha.startsWith('[') && linha.endsWith(']')) {
          categoria = linha.slice(1, -1);
          dados.categorias[categoria] = [];
          if (!categoriaAtual) categoriaAtual = categoria;
        } else if (categoria && linha.includes('|')) {
          const [nome, preco, descricao, foto] = linha.split('|');
          dados.categorias[categoria].push({ nome, preco, descricao, foto });
        }
      }
    }

    function renderizarTudo() {
      document.getElementById('titulo').textContent = dados.titulo;
      document.getElementById('subtitulo').textContent = dados.subtitulo;

      const catArea = document.getElementById('categorias');
      catArea.innerHTML = '';

      Object.keys(dados.categorias).forEach(cat => {
        const btn = document.createElement('button');
        btn.textContent = cat;
        btn.onclick = () => {
          categoriaAtual = cat;
          renderizarProdutos();
        };
        catArea.appendChild(btn);
      });

      renderizarProdutos();
    }

    function renderizarProdutos() {
      const area = document.getElementById('produtos');
      area.innerHTML = '';

      dados.categorias[categoriaAtual].forEach(prod => {
        const msg = encodeURIComponent(`Olá! Quero pedir ${prod.nome} - R$ ${prod.preco}`);
        area.innerHTML += `
          <div class="card">
            <img src="${prod.foto}" alt="${prod.nome}">
            <div class="info">
              <h3>${prod.nome}</h3>
              <p>${prod.descricao}</p>
              <div class="preco">R$ ${prod.preco}</div>
              <a href="https://wa.me/${dados.whatsapp}?text=${msg}" target="_blank">Pedir no WhatsApp</a>
            </div>
          </div>
        `;
      });
    }

    carregarTXT();
  </script>
</body>
</html>
