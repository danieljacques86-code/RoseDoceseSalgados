<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Playlist Player</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body, html { height: 100%; margin: 0; font-family: sans-serif; background: #000; color: white; }
        #bg-video { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -1; opacity: 0.4; filter: blur(5px); }
        
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; z-index: 1; }
        .login-box { background: rgba(0,0,0,0.8); padding: 30px; border-radius: 15px; border: 1px solid #ff0055; }
        
        input { padding: 12px; border-radius: 5px; border: none; width: 200px; margin-bottom: 10px; }
        button { padding: 12px 25px; background: #ff0055; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        #main-content { display: none; width: 100%; max-width: 900px; }
        .playlist { max-height: 300px; overflow-y: auto; background: rgba(255,255,255,0.1); margin-top: 20px; padding: 10px; border-radius: 8px; text-align: left; }
        .video-item { padding: 10px; border-bottom: 1px solid #333; cursor: pointer; transition: 0.3s; }
        .video-item:hover { background: #ff0055; }
    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="https://cdn.pixabay.com/video/2022/06/20/120967-724685353_tiny.mp4" type="video/mp4">
    </video>

    <div class="container">
        <div id="login" class="login-box">
            <h1>Acesso Restrito</h1>
            <input type="password" id="pass" placeholder="Digite a Senha">
            <button onclick="startApp()">ENTRAR</button>
        </div>

        <div id="main-content">
            <video id="my-video" class="video-js vjs-big-play-centered vjs-theme-city" controls preload="auto" width="800" height="450">
                <p class="vjs-no-js">Para ver este vídeo, habilite o JavaScript.</p>
            </video>
            
            <div class="playlist" id="playlist">
                <h3>Carregando lista...</h3>
            </div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <script>
        const LIST_URL = "https://dl.dropbox.com/scl/fi/r08te5c7fbto1nbpdts5r/xvideos.txt?rlkey=0c0bedps0aehi78d9ipfws81z&st=83vug75a&dl=1";
        const player = videojs('my-video');

        async function startApp() {
            const pass = document.getElementById('pass').value;
            if (pass === 'SEX6969') {
                document.getElementById('login').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                loadPlaylist();
            } else {
                alert('Senha Incorreta!');
            }
        }

        async function loadPlaylist() {
            try {
                const response = await fetch(LIST_URL);
                const text = await response.text();
                const lines = text.split('\n');
                const playlistDiv = document.getElementById('playlist');
                playlistDiv.innerHTML = '<h3>Selecione um Vídeo:</h3>';

                let currentName = "";

                lines.forEach(line => {
                    if (line.includes('#EXTINF:')) {
                        // Extrai o nome após a vírgula
                        currentName = line.split(',')[1] || "Vídeo sem nome";
                    } else if (line.trim().startsWith('http')) {
                        const link = line.trim();
                        const btn = document.createElement('div');
                        btn.className = 'video-item';
                        btn.innerText = "▶ " + currentName;
                        btn.onclick = () => playVideo(link);
                        playlistDiv.appendChild(btn);
                    }
                });
            } catch (err) {
                console.error("Erro ao carregar lista:", err);
            }
        }

        function playVideo(url) {
            player.src({ type: 'video/mp4', src: url });
            player.play();
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
