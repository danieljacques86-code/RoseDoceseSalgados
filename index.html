<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rose Doces e Salgados</title>
    <style>
        body { font-family: Arial; background: linear-gradient(rgba(255,248,245,.9), rgba(255,248,245,.9)), url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRmyUIdSlerxyk24F6lp7XOTitzLFu3PJorhzylzAMGgs&10) center/cover fixed; margin: 0; }
        header { background: linear-gradient(135deg, #ff8f8f, #ff6f61); color: #fff; text-align: center; padding: 40px 20px; box-shadow: 0 4px 20px rgba(255,143,143,.3); }
        .categorias { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin: 20px; }
        button { padding: 12px 20px; border: none; border-radius: 25px; background: #ff6f61; color: #fff; cursor: pointer; font-weight: bold; transition: all .3s; }
        button:hover, button.active { background: #e85a4f; transform: scale(1.05); }
        .produtos { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 30px; max-width: 1400px; margin: auto; }
        .card { background: rgba(255,255,255,.95); border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,.15); transition: transform .3s; }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .info { padding: 20px; text-align: center; }
        .preco { color: #e85a4f; font-size: 24px; font-weight: bold; margin: 15px 0; }
        .whatsapp-btn { display: inline-block; padding: 12px 25px; background: #25D366; color: #fff; text-decoration: none; border-radius: 25px; font-weight: bold; transition: background .3s; }
        .whatsapp-btn:hover { background: #128C7E; }
        /* Estilo mínimo só para a nova imagem no topo */
        .topo-imagem { width: 100%; height: 300px; object-fit: cover; display: block; }
    </style>
</head>
<body>
    <header>
        <h1>ROSE DOCES E SALGADOS</h1>
        <p>Doces e Salgados Caseiros Feitos com Amor </p>
    </header>
    
    <!-- Imagem Dropbox adicionada no topo -->
    <img src="https://dl.dropbox.com/scl/fi/e9vcv99wayzjq59qugxyl/rosesalg.jpg?rlkey=sr5ddznsp0gwligwirycrfhpi&st=1ttapcny&dl=0" alt="Capa Rose Doces e Salgados" class="topo-imagem">
    
    <div id="categorias"></div>
    <div id="produtos"></div>
    
    <script>
        const dados = {
            whatsapp: "5517999999999", // TROQUE PELO SEU NÚMERO
            categorias: {
                "Doces": [
                    { nome: "Brigadeiro Gourmet", preco: "R$ 120,00", descricao: "Brigadeiro cremoso com granulado", foto: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRZvTs8jqAn8GOIwf6tdABAWFSqVtqYSjwlysHrixuEgs&10" },
                    { nome: "Bolo de Cenoura", preco: "R$ 35,00", descricao: "Bolo fofinho c/ cobertura de chocolate", foto: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQOQx3FvqxQvLWXRIViwmRppf-xXqZ8tHmvsYpNZFJ0As10" },
                    { nome: "Pudim de Leite", preco: "R$ 30,00", descricao: "Pudim cremoso com caramelo caseiro", foto: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSSQlljghU-z-TPWmS4FAmVBGGtBqIAHc3DA4BsGGFtFQs10" },
                    { nome: "Torta Holandesa", preco: "R$ 65,00", descricao: "Torta crocante de chocolate e caramelo", foto: "https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=400&h=250&fit=crop" }
                ],
                "Salgados": [
                    { nome: "Coxinha de Frango", preco: "R$ 85,00 (100un)", descricao: "Coxinha crocante recheada c/ frango", foto: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSDpcZRvyvUcbOuaVlIkFGCqMnhtjwqJqIz78s3QIjAhQ&s=10" },
                    { nome: "Pastel de Carne", preco: "R$ 85,00 (100un)", descricao: "Pastel frito c/ carne moída temperada", foto: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQzKugMeJ4tddIwDvsJF-IkRCgmq_vExpza6gaS8pLOkQ&s=10" },
                    { nome: "Empadadinha", preco: "R$ 100,00 (100un)", descricao: "Empada leve e saborosa", foto: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTckHC7GlocMA4vN-jq3BGMSTEniXWVrxqmfVbui3TpQs10" },
                    { nome: "Risole de Queijo", preco: "R$ 85,00 (100un)", descricao: "Risole recheado c/ muçarela derretida", foto: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR2f3hCEbtpdlvhHa7PBw--e2U0smOOuEUxIDIwZMAQ-Qs10" }
                ],
                "Combo Família": [
                    { nome: "Combo Salgado 20un", preco: "R$ 85,00", descricao: "Mix coxinhas, pastéis, empadas", foto: "https://images.unsplash.com/photo-1562440499-64e7f7a33733?w=400&h=250&fit=crop" },
                    { nome: "Combo Doce 12un", preco: "R$ 65,00", descricao: "Brigadeiros, brownies, cookies", foto: "https://images.unsplash.com/photo-1551028719-00167b16eac5?w=400&h=250&fit=crop" },
                    { nome: "Festa Kids 30un", preco: "R$ 140,00", descricao: "Salgados + docinhos infantis", foto: "https://images.unsplash.com/photo-1603482824006-f8b5f4e0ceae?w=400&h=250&fit=crop" }
                ]
            }
        };

        let categoriaAtual = Object.keys(dados.categorias)[0];

        function renderizarTudo() {
            const catArea = document.getElementById('categorias');
            catArea.innerHTML = '';
            Object.keys(dados.categorias).forEach(cat => {
                const btn = document.createElement('button');
                btn.textContent = cat;
                btn.className = (categoriaAtual === cat) ? 'active' : '';
                btn.onclick = () => {
                    categoriaAtual = cat;
                    document.querySelectorAll('#categorias button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderizarProdutos();
                };
                catArea.appendChild(btn);
            });
            renderizarProdutos();
        }

        function renderizarProdutos() {
            const area = document.getElementById('produtos');
            area.innerHTML = '';
            const produtos = dados.categorias[categoriaAtual];
            produtos.forEach(prod => {
                const msg = encodeURIComponent(`Olá Rose! Quero pedir ${prod.nome} - ${prod.preco}`);
                const card = `
                    <div class="card">
                        <img src="${prod.foto}" alt="${prod.nome}" onerror="this.src='https://via.placeholder.com/400x250/ff69b4/fff?text=${encodeURIComponent(prod.nome)}'">
                        <div class="info">
                            <h3>${prod.nome}</h3>
                            <p>${prod.descricao}</p>
                            <div class="preco">${prod.preco}</div>
                            <a href="https://wa.me/${dados.whatsapp}?text=${msg}" target="_blank" class="whatsapp-btn">Pedir no WhatsApp</a>
                        </div>
                    </div>
                `;
                area.innerHTML += card;
            });
        }

        // Carrega imediatamente
        renderizarTudo();
    </script>
</body>
</html>
