
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player de Vídeo</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        #videoBackground {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            object-fit: cover;
        }
        #content {
            z-index: 1;
            text-align: center;
            color: white;
        }
        #passwordInput {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <video id="videoBackground" autoplay muted loop>
        <source src="https://cdn.pixabay.com/video/2022/06/20/120967-724685353_tiny.mp4" type="video/mp4">
    </video>
    
    <div id="content">
        <h1>Acesso ao Conteúdo</h1>
        <input type="password" id="passwordInput" placeholder="Senha de acesso">
        <button onclick="checkPassword()">Entrar</button>
        <div id="videoPlayer" style="display:none;">
            <h2>Player de Vídeo</h2>
            <video controls width="600">
                <source src="https://dl.dropbox.com/scl/fi/r08te5c7fbto1nbpdts5r/xvideos.txt?rlkey=0c0bedps0aehi78d9ipfws81z&st=b4lwon63&dl=1" type="video/mp4">
                Seu navegador não suporta a tag de vídeo.
            </video>
        </div>
    </div>

    <script>
        function checkPassword() {
            const password = document.getElementById('passwordInput').value;
            if (password === 'SEX6969') {
                document.getElementById('videoPlayer').style.display = 'block';
            } else {
                alert('Senha incorreta. Tente novamente.');
            }
        }
    </script>
</body>
</html>
